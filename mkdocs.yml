site_name: Firebase User Documentation for COMP 1800
site_url: https://placeholder.example
theme:
  name: material
  logo: assets/logo.png
  font:
    text: Google Sans
    code: Red Hat Mono
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: deep orange
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: deep orange
      accent: deep orange

  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - toc.integrate

nav:
  - Home: index.md
  - Setting Up Firebase: task1_firebase_setup.md
  - Setting Up Firestore Database: task2_firestore_setup.md
  - Setting Up Authentication: task3_authentication.md
  # - Deploying Your Project: task4_deploy.md
  - Troubleshooting: troubleshooting.md
  - Glossary: glossary.md

markdown_extensions:
  - attr_list
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
